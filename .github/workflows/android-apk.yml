# 在 GitHub Actions 上构建 Android APK
# 触发：手动 workflow_dispatch，或推送 v* tag
name: Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CI: true
  # 用于步骤 if 判断；未配置时为空，走未签名 release APK
  ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # 真机主流架构；仅打 arm64，缩短 CI 并得到可直接安装的 APK
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 勿开 cache: gradle：gen/android 在 init 前不存在，会直接失败
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: false
          link-to-sdk: true

      # https://github.com/nttld/setup-ndk/issues/518
      - name: Fix NDK LLVM symlinks
        run: |
          directory="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          find "$directory" -type l | while read -r link; do
            current_target=$(readlink "$link")
            new_target="$directory/$(basename "$current_target")"
            ln -sf "$new_target" "$link"
          done

      - name: Install npm dependencies
        run: npm ci

      - name: Init Android project
        run: npx tauri android init --ci
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # gen/android 默认是 Tauri 占位图标；仓库自定义图标在 icons/android
      - name: Sync Android launcher icons
        run: python scripts/sync-android-icons.py

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure release signing
        if: env.ANDROID_KEY_BASE64 != ''
        run: |
          set -euo pipefail
          cd src-tauri/gen/android
          echo "keyAlias=${ANDROID_KEY_ALIAS}" > keystore.properties
          echo "password=${ANDROID_KEY_PASSWORD}" >> keystore.properties
          echo "${ANDROID_KEY_BASE64}" | base64 -d > "${RUNNER_TEMP}/keystore.jks"
          echo "storeFile=${RUNNER_TEMP}/keystore.jks" >> keystore.properties

          python3 <<'PY'
          from pathlib import Path
          path = Path("app/build.gradle.kts")
          text = path.read_text(encoding="utf-8")
          if "signingConfigs" in text:
              raise SystemExit(0)
          if "import java.io.FileInputStream" not in text:
              text = text.replace(
                  "import java.util.Properties",
                  "import java.util.Properties\nimport java.io.FileInputStream",
              )
          signing = """
              signingConfigs {
                  create("release") {
                      val keystorePropertiesFile = rootProject.file("keystore.properties")
                      val keystoreProperties = Properties()
                      if (keystorePropertiesFile.exists()) {
                          keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                          keyAlias = keystoreProperties["keyAlias"] as String
                          keyPassword = keystoreProperties["password"] as String
                          storeFile = file(keystoreProperties["storeFile"] as String)
                          storePassword = keystoreProperties["password"] as String
                      }
                  }
              }
          """
          text = text.replace("    buildTypes {", signing + "    buildTypes {", 1)
          old = '        getByName("release") {\n            isMinifyEnabled = true'
          new = '        getByName("release") {\n            signingConfig = signingConfigs.getByName("release")\n            isMinifyEnabled = true'
          if old not in text:
              raise SystemExit("failed to patch release signingConfig in build.gradle.kts")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Build APK (arm64-v8a)
        run: npx tauri android build --apk --ci --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Collect APK artifacts
        id: collect
        run: |
          set -euo pipefail
          mkdir -p dist-apk
          mapfile -t apks < <(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' ! -name '*-aligned.apk' | sort)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No APK found under gen/android outputs" >&2
            exit 1
          fi
          for f in "${apks[@]}"; do
            cp -v "$f" "dist-apk/$(basename "$f")"
          done
          ls -lah dist-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-predict-android-apk
          path: dist-apk/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
